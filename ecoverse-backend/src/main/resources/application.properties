# ── App ────────────────────────────────────────────────────────────────────
spring.application.name=ecoverse

# ── Database ───────────────────────────────────────────────────────────────

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.main.web-application-type=servlet
spring.jpa.hibernate.ddl-auto=none


spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

google.client-id=${GOOGLE_CLIENT_ID}
# Cloudinary (set via env vars or local overrides)


cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ── JWT ────────────────────────────────────────────────────────────────────


ecoverse.jwt.secret=${ECOVERSE_JWT_SECRET}
ecoverse.jwt.expiration=${ECOVERSE_JWT_EXPIRATION}
# ── Server ─────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# Multipart upload limits (profile photos, future image uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1